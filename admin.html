<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Admin - NAMCUMZ</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-light);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }
        .sidebar-logo {
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }
        .sidebar-nav {
            flex: 1;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            color: var(--text-muted);
            font-weight: 600;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover, .sidebar-link.active {
            color: var(--accent);
            background: rgba(94, 234, 212, 0.05);
            border-left-color: var(--accent);
        }
        .sidebar-link i {
            width: 20px;
            text-align: center;
        }
        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid var(--border-light);
        }

        /* Main Content */
        .admin-main {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
            background: var(--bg-main);
        }

        /* Top Bar */
        .admin-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .admin-title h1 {
            font-size: 1.8rem;
            color: var(--text-main);
        }
        .admin-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .admin-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        /* Data Table */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            overflow-x: auto;
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
        }
        th {
            background: rgba(255,255,255,0.02);
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        td {
            font-size: 0.95rem;
            color: var(--text-main);
        }
        tr:hover td {
            background: rgba(255,255,255,0.02);
        }
        tr:last-child td {
            border-bottom: none;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
        }
        .btn-edit { background: var(--status-dang-cay); color: #000; border: none; cursor: pointer; }
        .btn-delete { background: var(--status-tam-dung); color: #fff; border: none; cursor: pointer; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 12px;
            width: 100%; max-width: 600px; padding: 30px; position: relative;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <a href="/" class="logo-text" style="font-size: 1.5rem;">NAMCUMZ</a>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active"><i class="fa-solid fa-list-check"></i> Quản lý đơn cày</a>
                <a href="/checkscam" class="sidebar-link"><i class="fa-solid fa-shield-virus"></i> Check Scam</a>
                <a href="/" class="sidebar-link"><i class="fa-solid fa-house"></i> Về trang chủ</a>
            </nav>
            <div class="sidebar-footer">
                <button id="adminLogoutBtn" class="btn btn-secondary" style="width: 100%; border-color: rgba(239, 68, 68, 0.3); color: var(--status-tam-dung);">
                    <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-topbar animate-on-load">
                <div class="admin-title">
                    <h1>Quản lý Đơn Cày Thuê</h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Hệ thống quản trị viên toàn quyền</p>
                </div>
                <div class="admin-profile">
                    <button class="btn btn-accent" id="openAddModalBtn"><i class="fa-solid fa-plus"></i> Thêm Đơn Thủ Công</button>
                    <div class="admin-avatar">AD</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row animate-on-load" style="animation-delay: 0.1s; margin: 0 0 40px 0;">
                <div class="stat-card">
                    <div class="stat-lbl">Chờ xử lý</div>
                    <div class="stat-val" style="color: #a855f7;" id="adm-stat-pending">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Đang cày</div>
                    <div class="stat-val" style="color: var(--status-dang-cay);" id="adm-stat-playing">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Hoàn thành</div>
                    <div class="stat-val" style="color: var(--status-hoan-thanh);" id="adm-stat-done">0</div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container animate-on-load" style="animation-delay: 0.2s;">
                <table>
                    <thead>
                        <tr>
                            <th>Mã Đơn</th>
                            <th>Khách Hàng</th>
                            <th>Người Cày</th>
                            <th>Nội dung</th>
                            <th>Giá</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <!-- Rendered by JS -->
                        <tr><td colspan="7" style="text-align: center;">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Admin Order Modal (For Create/Edit) -->
    <div class="modal-overlay" id="adminOrderModal">
        <div class="modal-content">
            <button class="modal-close" id="closeAdminModal"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="modal-title" id="modalTitle">THÊM/SỬA ĐƠN HÀNG</h2>
            <form id="adminOrderForm">
                <input type="hidden" id="adminOrderId"> <!-- Hidden ID for Edit -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Tên Người Cày (Booster)</label>
                        <input type="text" id="adminBooster" class="form-control" placeholder="Để trống nếu chưa có">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tên Người Thuê</label>
                        <input type="text" id="adminRenter" class="form-control" placeholder="Nhập tên khách" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Nội dung cày</label>
                    <textarea id="adminContent" class="form-control" rows="3" required></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Giá tiền (VND)</label>
                        <input type="text" id="adminPrice" class="form-control" placeholder="VD: 500,000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Trạng thái</label>
                        <select id="adminStatus" class="form-control" style="background-color: var(--bg-secondary);">
                            <option value="cho_xu_ly">Chờ xử lý</option>
                            <option value="dang_cay">Đang cày</option>
                            <option value="hoan_thanh">Hoàn thành</option>
                            <option value="tam_dung">Tạm dừng</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">LƯU DỮ LIỆU</button>
            </form>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/app.js"></script>
    <script>
        // Admin specific logic
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('userRole') !== 'admin') {
                alert('Bạn không có quyền truy cập trang quản trị!');
                window.location.href = '/';
                return;
            }

            const modal = document.getElementById('adminOrderModal');
            const form = document.getElementById('adminOrderForm');

            // Open Create Modal
            document.getElementById('openAddModalBtn').addEventListener('click', () => {
                document.getElementById('modalTitle').textContent = 'THÊM ĐƠN THỦ CÔNG';
                form.reset();
                document.getElementById('adminOrderId').value = '';
                modal.classList.add('active');
            });

            // Close Modal
            document.getElementById('closeAdminModal').addEventListener('click', () => {
                modal.classList.remove('active');
            });

            // Logout
            document.getElementById('adminLogoutBtn').addEventListener('click', () => {
                localStorage.clear();
                supabaseClient.auth.signOut().then(() => {
                    window.location.href = '/';
                });
            });

            // Fetch and render Admin Table
            async function loadAdminTable() {
                const { data, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
                if(error) return;

                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = '';
                
                let pending = 0, playing = 0, done = 0;

                data.forEach(order => {
                    if(order.status === 'cho_xu_ly') pending++;
                    if(order.status === 'dang_cay') playing++;
                    if(order.status === 'hoan_thanh') done++;

                    let statusText = order.status;
                    let color = '#fff';
                    if(order.status === 'cho_xu_ly') { statusText = 'Chờ xử lý'; color = '#a855f7'; }
                    if(order.status === 'dang_cay') { statusText = 'Đang cày'; color = 'var(--status-dang-cay)'; }
                    if(order.status === 'hoan_thanh') { statusText = 'Hoàn thành'; color = 'var(--status-hoan-thanh)'; }
                    if(order.status === 'tam_dung') { statusText = 'Tạm dừng'; color = 'var(--status-tam-dung)'; }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${order.order_code}</strong></td>
                        <td style="color: var(--accent);">${order.renter_name}</td>
                        <td>${order.booster_name || '-'}</td>
                        <td><div style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${order.content}</div></td>
                        <td style="color: var(--status-dang-cay); font-weight:bold;">${order.price || '-'}</td>
                        <td style="color: ${color}; font-weight: 600;">${statusText}</td>
                        <td class="action-btns">
                            <button class="btn-sm btn-edit" onclick="editOrder('${order.id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-sm btn-delete" onclick="deleteOrder('${order.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('adm-stat-pending').textContent = pending;
                document.getElementById('adm-stat-playing').textContent = playing;
                document.getElementById('adm-stat-done').textContent = done;
            }

            // Global functions for inline onclick handlers
            window.editOrder = async (id) => {
                const { data, error } = await supabaseClient.from('orders').select('*').eq('id', id).single();
                if(data) {
                    document.getElementById('modalTitle').textContent = 'SỬA ĐƠN HÀNG';
                    document.getElementById('adminOrderId').value = data.id;
                    document.getElementById('adminBooster').value = data.booster_name || '';
                    document.getElementById('adminRenter').value = data.renter_name || '';
                    document.getElementById('adminContent').value = data.content || '';
                    document.getElementById('adminPrice').value = data.price || '';
                    document.getElementById('adminStatus').value = data.status || 'dang_cay';
                    modal.classList.add('active');
                }
            };

            window.deleteOrder = async (id) => {
                if(confirm('Bạn có chắc chắn muốn xóa đơn này không?')) {
                    const { error } = await supabaseClient.from('orders').delete().eq('id', id);
                    if(!error) loadAdminTable();
                }
            };

            // Submit Form (Create/Update)
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('adminOrderId').value;
                const payload = {
                    booster_name: document.getElementById('adminBooster').value,
                    renter_name: document.getElementById('adminRenter').value,
                    content: document.getElementById('adminContent').value,
                    price: document.getElementById('adminPrice').value,
                    status: document.getElementById('adminStatus').value
                };

                if(id) {
                    // Update
                    const { error } = await supabaseClient.from('orders').update(payload).eq('id', id);
                    if(!error) {
                        modal.classList.remove('active');
                        loadAdminTable();
                    } else alert(error.message);
                } else {
                    // Insert
                    payload.order_code = '#' + Math.floor(10000 + Math.random() * 90000);
                    const { error } = await supabaseClient.from('orders').insert([payload]);
                    if(!error) {
                        modal.classList.remove('active');
                        loadAdminTable();
                    } else alert(error.message);
                }
            });

            // Initial Load
            loadAdminTable();
        });
    </script>
</body>
</html>
