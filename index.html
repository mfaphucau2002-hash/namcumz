<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống cày thuê NAMCUMZ</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="app-container header-wrap">
            <a href="index.html" class="logo-section">
                <span class="logo-text">NAMCUMZ</span>
            </a>

            <nav class="navigation">
                <a href="index.html" class="nav-link active">
                    <i class="fa-solid fa-chart-line"></i> Các đơn cày
                </a>
                <a href="checkscam.html" class="nav-link scam">
                    <i class="fa-solid fa-shield-virus"></i> Check Scam
                </a>
                <a href="login.html" class="btn btn-primary" id="loginBtn">
                    <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập / Đăng ký
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="app-container" style="padding-top: 30px; min-height: 70vh;">
        <div class="hero animate-on-load" style="animation-delay: 0.1s;">
            <h1>CÁC ĐƠN CÀY</h1>
            <p>Theo dõi tiến độ cày game của bạn một cách nhanh chóng và bảo mật.</p>
        </div>

        <!-- Stats -->
        <div class="stats-row animate-on-load" id="statsRow" style="animation-delay: 0.2s;">
            <div class="stat-card" style="border-color: rgba(0, 245, 212, 0.25);">
                <div class="stat-lbl">Tổng đơn</div>
                <div class="stat-val" style="color: var(--accent);" id="stat-total">0</div>
            </div>
            <div class="stat-card" style="border-color: rgba(255, 159, 28, 0.25);">
                <div class="stat-lbl">Tạm dừng</div>
                <div class="stat-val" style="color: var(--status-tam-dung);" id="stat-pause">0</div>
            </div>
            <div class="stat-card" style="border-color: rgba(255, 183, 3, 0.25);">
                <div class="stat-lbl">Đang cày</div>
                <div class="stat-val" style="color: var(--status-dang-cay);" id="stat-playing">0</div>
            </div>
            <div class="stat-card" style="border-color: rgba(56, 176, 0, 0.25);">
                <div class="stat-lbl">Đã hoàn thành</div>
                <div class="stat-val" style="color: var(--status-hoan-thanh);" id="stat-done">0</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar animate-on-load" style="animation-delay: 0.3s;">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Nhập tên người cày hoặc người thuê để tìm kiếm...">
            </div>
            <a href="login.html" class="btn btn-accent" id="createOrderBtn">
                <i class="fa-solid fa-plus"></i> Đăng nhập để tạo đơn
            </a>
        </div>

        <!-- Orders Grid -->
        <div class="orders-grid" id="ordersGrid">
            <!-- Order Cards will be generated by JS here -->
        </div>
    </main>

    <!-- Footer -->
    <footer style="border-top: 1px solid var(--border-light); padding: 40px 0; margin-top: 60px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
        <div class="app-container">
            <p>&copy; 2026 NAMCUMZ. Hệ thống bảo mật thông tin khách hàng tuyệt đối.</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="assets/js/app.js"></script>
</body>
</html>
